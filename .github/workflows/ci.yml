name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black isort
      
      - name: Lint with flake8
        run: |
          flake8 bot.py rag_engine.py --max-line-length=100 --ignore=E501,W503
      
      - name: Check formatting with black
        run: |
          black --check bot.py rag_engine.py
      
      - name: Check imports with isort
        run: |
          isort --check-only bot.py rag_engine.py

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests
        env:
          DEEPSEEK_API_KEY: test
          TELEGRAM_BOT_TOKEN: test
        run: |
          python -m pytest tests/ -v --tb=short 2>/dev/null || echo "No tests yet"
